<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoxMessenger</title>

<style>

*{
box-sizing:border-box;
font-family:system-ui;
}

body{
margin:0;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:600px;
height:100vh;
background:#020617;
display:flex;
flex-direction:column;
}

header{
padding:15px;
background:#1e293b;
font-weight:bold;
text-align:center;
}

#login{
margin:auto;
text-align:center;
padding:20px;
}

#login input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

#login button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

#chat{
display:none;
flex-direction:column;
height:100%;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
padding:10px 14px;
border-radius:12px;
max-width:75%;
word-wrap:break-word;
}

.you{
background:#3b82f6;
align-self:flex-end;
}

.other{
background:#1e293b;
align-self:flex-start;
}

.name{
font-size:12px;
opacity:0.7;
margin-bottom:3px;
}

#sendBox{
display:flex;
gap:6px;
padding:10px;
background:#020617;
}

#sendBox input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

#sendBox button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.clear{
background:#ef4444 !important;
}

@media (min-width:768px){

.container{
height:90vh;
border-radius:14px;
overflow:hidden;
}

}

</style>

</head>

<body>

<div class="container">

<header>MoxMessenger</header>

<div id="login">

<input id="username" placeholder="Nama kamu">

<input id="roomCode" maxlength="4" placeholder="Kode 4 digit">

<button onclick="joinRoom()">Mulai Chat</button>

</div>

<div id="chat">

<div id="messages"></div>

<div id="sendBox">

<input id="msg" placeholder="Ketik pesan">

<button onclick="sendMsg()">Send</button>

<button class="clear" onclick="clearChat()">Clear</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onChildAdded, remove, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAi9Fpm0AYulvJjiu__lTjP-xwfFpzIsck",
authDomain: "moxmessenger-6a5ba.firebaseapp.com",
databaseURL: "https://moxmessenger-6a5ba-default-rtdb.firebaseio.com",
projectId: "moxmessenger-6a5ba",
storageBucket: "moxmessenger-6a5ba.firebasestorage.app",
messagingSenderId: "865825527710",
appId: "1:865825527710:web:e9d0fbd29cdc1f40d8e88f",
measurementId: "G-1Z1L77E72P"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room="";
let userId=Math.random().toString(36).substring(2);
let username="";

window.joinRoom=function(){

username=document.getElementById("username").value;
let code=document.getElementById("roomCode").value;

if(username==""){
alert("isi nama dulu");
return;
}

if(code.length!=4){
alert("kode harus 4 digit");
return;
}

room=code;

set(ref(db,"rooms/"+room+"/users/"+userId),true);

onDisconnect(ref(db,"rooms/"+room+"/users/"+userId)).remove();

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="flex";

listenMsg();
checkRoom();

}

window.sendMsg=function(){

let text=document.getElementById("msg").value;

if(text=="") return;

push(ref(db,"rooms/"+room+"/messages"),{

user:userId,
name:username,
msg:text,
time:Date.now()

});

document.getElementById("msg").value="";

}

function listenMsg(){

onChildAdded(ref(db,"rooms/"+room+"/messages"),snap=>{

let data=snap.val();

let div=document.createElement("div");
div.classList.add("msg");

let name=document.createElement("div");
name.classList.add("name");
name.innerText=data.name;

let text=document.createElement("div");
text.innerText=data.msg;

div.appendChild(name);
div.appendChild(text);

if(data.user==userId){
div.classList.add("you");
}else{
div.classList.add("other");
}

document.getElementById("messages").appendChild(div);

document.getElementById("messages").scrollTop=999999;

});

}

window.clearChat=function(){

remove(ref(db,"rooms/"+room+"/messages"));

document.getElementById("messages").innerHTML="";

}

function checkRoom(){

onValue(ref(db,"rooms/"+room+"/users"),snap=>{

let users=snap.val();

if(!users){
remove(ref(db,"rooms/"+room));
}

});

}

</script>

</body>
</html>
