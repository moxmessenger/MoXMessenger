<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>MoxMessenger</title>

<style>

*{
box-sizing:border-box;
font-family:system-ui;
}

body{
margin:0;
background:#0f172a;
color:white;
height:100vh;
overflow:hidden;
}

/* container */

.container{
height:100vh;
max-width:900px;
margin:auto;
display:flex;
flex-direction:column;
}

/* header */

header{
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:18px;
background:#020617;
border-bottom:1px solid #1e293b;
}

/* login */

#login{
margin:auto;
width:90%;
max-width:320px;
background:#020617;
padding:25px;
border-radius:14px;
}

#login input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
}

#login button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:600;
}

/* chat */

#chat{
display:none;
flex-direction:column;
height:100%;
}

/* messages */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

/* bubble */

.msg{
padding:12px 14px;
border-radius:14px;
max-width:70%;
font-size:15px;
}

.you{
align-self:flex-end;
background:#2563eb;
}

.other{
align-self:flex-start;
background:#1e293b;
}

.name{
font-size:11px;
opacity:.6;
margin-bottom:3px;
}

.seen{
font-size:10px;
opacity:.6;
margin-top:4px;
}

/* typing */

#typing{
font-size:12px;
opacity:.6;
padding-left:20px;
margin-bottom:4px;
}

/* sendbox */

#sendBox{
display:flex;
gap:8px;
padding:10px;
background:#020617;
border-top:1px solid #1e293b;
}

#sendBox input{
flex:1;
border:none;
background:#0f172a;
border-radius:10px;
padding:12px;
color:white;
}

#sendBox button{
border:none;
padding:12px;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:600;
width:70px;
flex-shrink:0;
}

.clear{
background:#ef4444 !important;
}

</style>

</head>

<body>

<div class="container">

<header>MoxMessenger</header>

<div id="login">

<input id="username" placeholder="Nama kamu">
<input id="roomCode" maxlength="4" placeholder="Kode room 4 digit">

<button onclick="joinRoom()">Mulai Chat</button>

</div>

<div id="chat">

<div id="messages"></div>

<div id="typing"></div>

<div id="sendBox">
<input id="msg" placeholder="Ketik pesan">
<button onclick="sendMsg()">Send</button>
<button class="clear" onclick="clearChat()">Clear</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onChildAdded, remove, onValue, update, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "PASTE_APIKEY",
authDomain: "PASTE_DOMAIN",
databaseURL: "PASTE_DB",
projectId: "PASTE_ID",
storageBucket: "PASTE",
messagingSenderId: "PASTE",
appId: "PASTE"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room="";
let username="";
let userId=Math.random().toString(36).substring(2);

/* JOIN ROOM */

window.joinRoom = async function(){

username=document.getElementById("username").value;
room=document.getElementById("roomCode").value;

if(username==""){
alert("Isi nama dulu");
return;
}

if(room.length!=4){
alert("Kode harus 4 digit");
return;
}

let usersRef=ref(db,"rooms/"+room+"/users");
let snap=await get(usersRef);

if(snap.exists()){

let count=Object.keys(snap.val()).length;

if(count>=2){
alert("Room penuh");
return;
}

}

let userRef=ref(db,"rooms/"+room+"/users/"+userId);

set(userRef,true);
onDisconnect(userRef).remove();

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="flex";

listenMsg();
typingListener();

}

/* SEND MESSAGE */

window.sendMsg=function(){

let text=document.getElementById("msg").value;

if(text=="") return;

push(ref(db,"rooms/"+room+"/messages"),{

user:userId,
name:username,
msg:text,
seen:false,
time:Date.now()

});

document.getElementById("msg").value="";

}

/* LISTEN MESSAGE */

function listenMsg(){

onChildAdded(ref(db,"rooms/"+room+"/messages"),snap=>{

let data=snap.val();

let div=document.createElement("div");
div.classList.add("msg");

if(data.user==userId){
div.classList.add("you");
}else{
div.classList.add("other");
update(ref(db,"rooms/"+room+"/messages/"+snap.key),{seen:true});
}

div.innerHTML=

"<div class='name'>"+data.name+"</div>"+
data.msg+
"<div class='seen'>"+(data.seen?"✔✔":"✔")+"</div>";

let messages=document.getElementById("messages");

messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;

});

}

/* CLEAR CHAT */

window.clearChat=function(){

remove(ref(db,"rooms/"+room+"/messages"));
document.getElementById("messages").innerHTML="";

}

/* TYPING */

const msgInput=document.getElementById("msg");

msgInput.addEventListener("input",()=>{

set(ref(db,"rooms/"+room+"/typing/"+userId),username);

clearTimeout(window.typingTimeout);

window.typingTimeout=setTimeout(()=>{

remove(ref(db,"rooms/"+room+"/typing/"+userId));

},2000);

});

function typingListener(){

onValue(ref(db,"rooms/"+room+"/typing"),snap=>{

let data=snap.val();

if(!data){
document.getElementById("typing").innerText="";
return;
}

let names=Object.values(data).filter(n=>n!==username);

document.getElementById("typing").innerText=

names.length?names[0]+" sedang mengetik...":"";

});

}

/* AUTO CLEAR ROOM */

window.addEventListener("beforeunload", () => {

remove(ref(db,"rooms/"+room+"/users/"+userId));

});

</script>

</body>
</html>
