<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>MoxMessenger</title>

<style>

*{
box-sizing:border-box;
font-family:system-ui;
}

body{
margin:0;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:700px;
height:100vh;
background:#020617;
display:flex;
flex-direction:column;
}

header{
background:#1e293b;
padding:16px;
text-align:center;
font-weight:bold;
font-size:18px;
}

#login{
margin:auto;
width:90%;
max-width:320px;
}

#login input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:16px;
}

#login button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
}

#chat{
display:none;
flex-direction:column;
height:100%;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:12px 15px;
border-radius:12px;
max-width:75%;
font-size:15px;
}

.you{
background:#3b82f6;
align-self:flex-end;
}

.other{
background:#1e293b;
align-self:flex-start;
}

.name{
font-size:12px;
opacity:0.7;
margin-bottom:4px;
}

#typing{
font-size:12px;
opacity:0.6;
padding-left:15px;
}

#sendBox{
display:flex;
gap:8px;
padding:12px;
background:#020617;
}

#sendBox input{
flex:1;
padding:14px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:16px;
}

#sendBox button{
padding:14px 18px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:15px;
}

.clear{
background:#ef4444 !important;
}

.seen{
font-size:10px;
opacity:0.7;
margin-top:3px;
}

</style>

</head>

<body>

<div class="container">

<header>MoxMessenger</header>

<div id="login">

<input id="username" placeholder="Nama kamu">

<input id="roomCode" maxlength="4" placeholder="Kode 4 digit">

<button onclick="joinRoom()">Mulai Chat</button>

</div>

<div id="chat">

<div id="messages"></div>

<div id="typing"></div>

<div id="sendBox">

<input id="msg" placeholder="Ketik pesan">

<button onclick="sendMsg()">Send</button>

<button class="clear" onclick="clearChat()">Clear</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onChildAdded, remove, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAi9Fpm0AYulvJjiu__lTjP-xwfFpzIsck",
authDomain: "moxmessenger-6a5ba.firebaseapp.com",
databaseURL: "https://moxmessenger-6a5ba-default-rtdb.firebaseio.com",
projectId: "moxmessenger-6a5ba",
storageBucket: "moxmessenger-6a5ba.firebasestorage.app",
messagingSenderId: "865825527710",
appId: "1:865825527710:web:e9d0fbd29cdc1f40d8e88f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room="";
let userId=Math.random().toString(36).substring(2);
let username="";

window.joinRoom=function(){

username=document.getElementById("username").value;
let code=document.getElementById("roomCode").value;

if(username==""){ alert("isi nama"); return; }
if(code.length!=4){ alert("kode harus 4 digit"); return; }

room=code;

set(ref(db,"rooms/"+room+"/users/"+userId),true);

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="flex";

listenMsg();
typingListener();

}

window.sendMsg=function(){

let text=document.getElementById("msg").value;
if(text=="") return;

push(ref(db,"rooms/"+room+"/messages"),{
user:userId,
name:username,
msg:text,
seen:false,
time:Date.now()
});

document.getElementById("msg").value="";

}

function listenMsg(){

onChildAdded(ref(db,"rooms/"+room+"/messages"),snap=>{

let data=snap.val();

let div=document.createElement("div");
div.classList.add("msg");

if(data.user==userId){
div.classList.add("you");
}else{
div.classList.add("other");
update(ref(db,"rooms/"+room+"/messages/"+snap.key),{seen:true});
}

div.innerHTML=
"<div class='name'>"+data.name+"</div>"+
data.msg+
"<div class='seen'>"+(data.seen?"✔✔":"✔")+"</div>";

document.getElementById("messages").appendChild(div);
document.getElementById("messages").scrollTop=999999;

});

}

window.clearChat=function(){

remove(ref(db,"rooms/"+room+"/messages"));
document.getElementById("messages").innerHTML="";

}

const msgInput=document.getElementById("msg");

msgInput.addEventListener("input",()=>{

set(ref(db,"rooms/"+room+"/typing/"+userId),username);

setTimeout(()=>{
remove(ref(db,"rooms/"+room+"/typing/"+userId));
},1000);

});

function typingListener(){

onValue(ref(db,"rooms/"+room+"/typing"),snap=>{

let data=snap.val();

if(!data){
document.getElementById("typing").innerText="";
return;
}

let names=Object.values(data).filter(n=>n!==username);

document.getElementById("typing").innerText=
names.length?names[0]+" sedang mengetik...":"";

});

}

</script>

</body>
</html>
