<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>MoxMessenger</title>

<style>

*{
box-sizing:border-box;
font-family:Inter,system-ui,sans-serif;
}

body{
margin:0;
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
overflow:hidden;
}

.container{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
max-width:900px;
margin:auto;
display:flex;
flex-direction:column;
}

/* header */

header{
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:600;

background:rgba(30,41,59,0.6);
backdrop-filter:blur(10px);

border-bottom:1px solid rgba(255,255,255,0.05);
}

/* login */

#login{
margin:auto;
width:90%;
max-width:320px;

background:rgba(30,41,59,0.6);
backdrop-filter:blur(15px);

padding:25px;
border-radius:16px;

box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

#login input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
background:#020617;
color:white;
font-size:15px;
}

#login button{
width:100%;
padding:14px;
border:none;
border-radius:10px;

background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;

font-weight:600;
cursor:pointer;
}

/* chat */

#chat{
display:none;
flex-direction:column;
height:100%;
}

#messages{
position:absolute;
top:60px;
bottom:95px;
left:0;
right:0;
overflow-y:auto;

padding:20px;

display:flex;
flex-direction:column;
gap:14px;
}

/* bubble */

.msg{
padding:14px 16px;
border-radius:16px;
max-width:70%;
font-size:15px;
word-wrap:break-word;
}

.you{
align-self:flex-end;

background:linear-gradient(135deg,#3b82f6,#6366f1);
border-bottom-right-radius:4px;
}

.other{
align-self:flex-start;

background:#1e293b;
border-bottom-left-radius:4px;
}

.name{
font-size:11px;
opacity:0.6;
margin-bottom:4px;
}

.seen{
font-size:10px;
opacity:0.5;
margin-top:6px;
}

/* typing */

#typing{
position:absolute;
bottom:95px;
left:20px;
font-size:12px;
opacity:0.6;
}

/* sendbox */

#sendBox{
position:absolute;
bottom:10px;
left:10px;
right:10px;

display:flex;
gap:10px;

background:rgba(15,23,42,0.9);
backdrop-filter:blur(10px);

padding:10px;
border-radius:14px;

box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

#sendBox input{
flex:1;

border:none;
outline:none;

background:transparent;
color:white;

font-size:16px;
padding:10px;
}

#sendBox button{

border:none;
border-radius:10px;

padding:10px 16px;

background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;

font-weight:600;
cursor:pointer;

}

.clear{
background:#ef4444 !important;
}

</style>

</head>

<body>

<div class="container">

<header>MoxMessenger</header>

<div id="login">

<input id="username" placeholder="Nama kamu">
<input id="roomCode" maxlength="4" placeholder="Kode room 4 digit">

<button onclick="joinRoom()">Masuk Chat</button>

</div>

<div id="chat">

<div id="messages"></div>

<div id="typing"></div>

<div id="sendBox">

<input id="msg" placeholder="Ketik pesan">
<button onclick="sendMsg()">Send</button>
<button class="clear" onclick="clearChat()">Clear</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onChildAdded, remove, onValue, update, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAi9Fpm0AYulvJjiu__lTjP-xwfFpzIsck",
authDomain: "moxmessenger-6a5ba.firebaseapp.com",
databaseURL: "https://moxmessenger-6a5ba-default-rtdb.firebaseio.com",
projectId: "moxmessenger-6a5ba",
storageBucket: "moxmessenger-6a5ba.firebasestorage.app",
messagingSenderId: "865825527710",
appId: "1:865825527710:web:e9d0fbd29cdc1f40d8e88f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room="";
let username="";
let userId=Math.random().toString(36).substring(2);

window.joinRoom = async function(){

username=document.getElementById("username").value;
room=document.getElementById("roomCode").value;

if(username==""){
alert("isi nama dulu");
return;
}

if(room.length!=4){
alert("kode harus 4 digit");
return;
}

let usersRef=ref(db,"rooms/"+room+"/users");
let snap=await get(usersRef);

if(snap.exists()){
let count=Object.keys(snap.val()).length;
if(count>=2){
alert("Room penuh (max 2 orang)");
return;
}
}

let userRef=ref(db,"rooms/"+room+"/users/"+userId);

set(userRef,true);
onDisconnect(userRef).remove();

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="flex";

listenMsg();
typingListener();

}

window.sendMsg=function(){

let text=document.getElementById("msg").value;
if(text=="") return;

push(ref(db,"rooms/"+room+"/messages"),{

user:userId,
name:username,
msg:text,
seen:false,
time:Date.now()

});

document.getElementById("msg").value="";

}

function listenMsg(){

onChildAdded(ref(db,"rooms/"+room+"/messages"),snap=>{

let data=snap.val();

let div=document.createElement("div");
div.classList.add("msg");

if(data.user==userId){
div.classList.add("you");
}else{
div.classList.add("other");
update(ref(db,"rooms/"+room+"/messages/"+snap.key),{seen:true});
}

div.innerHTML=
"<div class='name'>"+data.name+"</div>"+
data.msg+
"<div class='seen'>"+(data.seen?"✔✔":"✔")+"</div>";

let messages=document.getElementById("messages");

messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;

});

}

window.clearChat=function(){

remove(ref(db,"rooms/"+room+"/messages"));
document.getElementById("messages").innerHTML="";

}

const msgInput=document.getElementById("msg");

msgInput.addEventListener("input",()=>{

set(ref(db,"rooms/"+room+"/typing/"+userId),username);

setTimeout(()=>{
remove(ref(db,"rooms/"+room+"/typing/"+userId));
},1000);

});

function typingListener(){

onValue(ref(db,"rooms/"+room+"/typing"),snap=>{

let data=snap.val();

if(!data){
document.getElementById("typing").innerText="";
return;
}

let names=Object.values(data).filter(n=>n!==username);

document.getElementById("typing").innerText=
names.length?names[0]+" sedang mengetik...":"";

});

}

/* AUTO CLEAR SAAT TAB DITUTUP */

window.addEventListener("beforeunload", () => {

remove(ref(db,"rooms/"+room+"/messages"));
remove(ref(db,"rooms/"+room+"/typing/"+userId));
remove(ref(db,"rooms/"+room+"/users/"+userId));

});

document.addEventListener("visibilitychange", () => {

if(document.visibilityState === "hidden"){

remove(ref(db,"rooms/"+room+"/messages"));
remove(ref(db,"rooms/"+room+"/typing/"+userId));
remove(ref(db,"rooms/"+room+"/users/"+userId));

}

});

</script>

</body>
</html>
